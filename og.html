<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Archivo:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0e0f;
    --line: #2a2e36;
    --text: #e8e6e0;
    --text-dim: #8b8e96;
    --signal: #c2f632;
    --grid: rgba(232, 230, 224, 0.05);
  }
  body { background: #000; margin: 0; }
  .card {
    width: 1200px;
    height: 630px;
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px),
      radial-gradient(ellipse at 50% 60%, rgba(194, 246, 50, 0.14), transparent 60%);
    background-size: 60px 60px, 60px 60px, 100% 100%;
    position: relative;
    overflow: hidden;
  }

  .top {
    position: absolute;
    top: 48px; left: 64px; right: 64px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 14px;
    letter-spacing: 0.18em;
    color: var(--text-dim);
  }
  .brand { display: flex; align-items: center; gap: 14px; }
  .badge {
    background: var(--signal);
    color: var(--bg);
    padding: 6px 11px;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.18em;
  }
  .brand strong { color: var(--text); letter-spacing: 0.2em; font-weight: 600; font-size: 16px; }
  .top-right { color: var(--signal); font-weight: 600; }

  h1 {
    position: absolute;
    top: 50%;
    left: 0; right: 0;
    transform: translateY(-50%);
    text-align: center;
    font-family: 'Archivo', sans-serif;
    font-weight: 900;
    font-size: 180px;
    line-height: 0.9;
    letter-spacing: -0.045em;
    text-transform: uppercase;
  }
  h1 .signal { color: var(--signal); }

  .footer {
    position: absolute;
    bottom: 48px; left: 64px; right: 64px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    color: var(--text-dim);
    font-size: 13px;
    letter-spacing: 0.18em;
  }
  .footer .url { color: var(--text); }
</style>
</head>
<body>
<div class="card">
  <div class="top">
    <div class="brand">
      <span class="badge">LL</span>
      <strong>LIFT.LOG</strong>
    </div>
    <div class="top-right">// A WORKOUT TRACKER FOR LIFTERS, NOT DRIFTERS</div>
  </div>

  <h1>JUST <span class="signal">LIFT.</span></h1>

  <div class="footer">
    <span>FREE · OFFLINE · YOUR PHONE</span>
    <span class="url">mattlea39-zaf.github.io/liftlog</span>
  </div>
</div>
</body>
</html>
